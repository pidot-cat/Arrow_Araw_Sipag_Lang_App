name: arrow_araw_sipag_lang
description: A colorful arrow puzzle escape mobile game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.5

  # Shared Preferences for local storage
  shared_preferences: ^2.2.0

  # Supabase for backend
  supabase_flutter: ^2.8.1

  # Icons
  cupertino_icons: ^1.0.2

  # Audio
  audioplayers: ^6.6.0

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "assets/images/MainLogo.jpg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/MainLogo.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/